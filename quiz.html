<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>马原刷题系统</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, "Microsoft YaHei", sans-serif; background: #f0f2f5; min-height: 100vh; }

nav { background: linear-gradient(135deg, #c62828, #e53935); color: #fff; padding: 0 20px;
  display: flex; align-items: center; height: 56px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.15); }
nav .brand { font-size: 20px; font-weight: 700; margin-right: 32px; white-space: nowrap; }
nav .tabs { display: flex; gap: 4px; }
nav .tab { padding: 8px 20px; border-radius: 8px 8px 0 0; cursor: pointer; font-size: 15px;
  transition: all .2s; color: rgba(255,255,255,.75); white-space: nowrap; }
nav .tab:hover { color: #fff; background: rgba(255,255,255,.1); }
nav .tab.active { color: #e53935; background: #fff; font-weight: 600; }
nav .stats { margin-left: auto; display: flex; gap: 16px; font-size: 14px; white-space: nowrap; }

.page { display: none; max-width: 800px; margin: 0 auto; padding: 24px 16px; }
.page.active { display: block; }

.filters { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 20px; align-items: center; }
.filters select, .filters button { padding: 8px 14px; border: 1px solid #ddd; border-radius: 8px;
  font-size: 14px; background: #fff; cursor: pointer; }
.filters select:focus { outline: none; border-color: #e53935; }

.progress-wrap { margin-bottom: 16px; }
.progress-info { display: flex; justify-content: space-between; font-size: 13px; color: #666; margin-bottom: 6px; }
.progress-bar { height: 6px; background: #e0e0e0; border-radius: 3px; overflow: hidden; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #e53935, #ff6f60); border-radius: 3px; transition: width .3s; }

.badges { display: flex; gap: 12px; margin-bottom: 16px; }
.badge { padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 600; }
.badge-correct { background: #e8f5e9; color: #2e7d32; }
.badge-wrong { background: #ffebee; color: #c62828; }

.qcard { background: #fff; border-radius: 12px; box-shadow: 0 2px 12px rgba(0,0,0,.08);
  padding: 28px 24px; margin-bottom: 16px; }
.qmeta { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.qchapter, .qtype { padding: 3px 10px; border-radius: 4px; font-size: 12px; font-weight: 600; }
.qchapter { background: #e3f2fd; color: #1565c0; }
.qtype-single { background: #e8f5e9; color: #2e7d32; }
.qtype-multi { background: #fff3e0; color: #e65100; }
.qtype-judge { background: #f3e5f5; color: #7b1fa2; }
.qtext { font-size: 17px; line-height: 1.7; color: #212121; margin-bottom: 20px; word-break: break-all; }
.multi-hint { color: #e65100; font-size: 13px; margin-bottom: 12px; font-weight: 600; }

.options { display: flex; flex-direction: column; gap: 10px; }
.opt { padding: 14px 18px; border: 2px solid #e0e0e0; border-radius: 10px; cursor: pointer;
  font-size: 15px; transition: all .2s; background: #fafafa; user-select: none;
  display: flex; align-items: center; gap: 10px; }
.opt:hover { border-color: #e53935; background: #fff5f5; }
.opt.selected { border-color: #e53935; background: #ffebee; color: #c62828; font-weight: 600; }
.opt.correct { border-color: #4caf50; background: #e8f5e9; color: #2e7d32; }
.opt.wrong { border-color: #f44336; background: #ffebee; color: #c62828; }
.opt.disabled { pointer-events: none; opacity: .7; }
.opt-key { width: 28px; height: 28px; border-radius: 50%; background: #e0e0e0;
  display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 13px; flex-shrink: 0; }
.opt.selected .opt-key { background: #e53935; color: #fff; }
.opt.correct .opt-key { background: #4caf50; color: #fff; }
.opt.wrong .opt-key { background: #f44336; color: #fff; }

.judge-opts { display: flex; gap: 16px; }
.judge-opt { flex: 1; padding: 20px; border: 3px solid #e0e0e0; border-radius: 12px; cursor: pointer;
  text-align: center; font-size: 20px; font-weight: 700; transition: all .2s; background: #fafafa; user-select: none; }
.judge-opt:hover { border-color: #e53935; background: #fff5f5; }
.judge-opt.selected { border-color: #e53935; background: #ffebee; color: #c62828; }
.judge-opt.correct { border-color: #4caf50; background: #e8f5e9; color: #2e7d32; }
.judge-opt.wrong { border-color: #f44336; background: #ffebee; color: #c62828; }
.judge-opt.disabled { pointer-events: none; opacity: .7; }

.submit-btn { margin-top: 16px; padding: 12px 40px; background: #e53935; color: #fff;
  border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; }
.submit-btn:hover { background: #c62828; }
.submit-btn:disabled { background: #ccc; cursor: not-allowed; }

.toast { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); padding: 14px 28px;
  border-radius: 10px; font-size: 15px; font-weight: 600; z-index: 999; opacity: 0;
  transition: opacity .3s; pointer-events: none; box-shadow: 0 4px 16px rgba(0,0,0,.15); }
.toast.show { opacity: 1; }
.toast-success { background: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
.toast-error { background: #ffebee; color: #c62828; border: 1px solid #ef9a9a; }

.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.5); z-index: 200;
  display: flex; align-items: center; justify-content: center; }
.modal { background: #fff; border-radius: 16px; padding: 32px; max-width: 520px; width: 90%;
  max-height: 80vh; overflow-y: auto; box-shadow: 0 8px 32px rgba(0,0,0,.2); }
.modal h3 { font-size: 18px; margin-bottom: 16px; color: #c62828; }
.modal .ans-row { margin: 8px 0; font-size: 15px; }
.modal .ans-correct { color: #2e7d32; font-weight: 600; }
.modal .ans-wrong { color: #c62828; font-weight: 600; }
.modal .explain { margin-top: 14px; padding: 14px; background: #fff8e1; border-radius: 8px;
  font-size: 14px; line-height: 1.6; color: #555; }
.modal-btns { display: flex; gap: 12px; margin-top: 20px; }
.modal-btns button { flex: 1; padding: 12px; border: none; border-radius: 8px; font-size: 15px;
  font-weight: 600; cursor: pointer; }
.btn-retry { background: #fff3e0; color: #e65100; }
.btn-next { background: #e53935; color: #fff; }
.btn-retry:hover { background: #ffe0b2; }
.btn-next:hover { background: #c62828; }

.finish { text-align: center; padding: 40px 24px; }
.finish h2 { font-size: 28px; margin-bottom: 20px; }
.finish .score { font-size: 64px; font-weight: 800; color: #e53935; margin: 20px 0; }
.finish .detail { font-size: 16px; color: #666; margin-bottom: 30px; }
.finish-btns { display: flex; gap: 16px; justify-content: center; flex-wrap: wrap; }
.finish-btns button { padding: 12px 32px; border: none; border-radius: 10px; font-size: 16px;
  font-weight: 600; cursor: pointer; }
.finish-btns .btn-primary { background: #e53935; color: #fff; }
.finish-btns .btn-secondary { background: #fff; color: #e53935; border: 2px solid #e53935; }
.finish-btns button:hover { opacity: .85; }

.search-box { width: 100%; padding: 12px 16px; border: 2px solid #e0e0e0; border-radius: 10px;
  font-size: 15px; margin-bottom: 20px; }
.search-box:focus { outline: none; border-color: #e53935; }
.select-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
.select-header .count { font-size: 14px; color: #666; }
.select-header .actions { display: flex; gap: 8px; }
.select-header button { padding: 6px 16px; border: 1px solid #ddd; border-radius: 6px;
  font-size: 13px; cursor: pointer; background: #fff; }
.select-header button:hover { border-color: #e53935; }
.chapter-group { margin-bottom: 8px; }
.chapter-toggle { padding: 12px 16px; background: #fff; border: 1px solid #eee; border-radius: 8px;
  cursor: pointer; display: flex; justify-content: space-between; align-items: center;
  font-weight: 600; font-size: 15px; width: 100%; text-align: left; }
.chapter-toggle:hover { background: #fafafa; }
.chapter-toggle .arrow { transition: transform .2s; }
.chapter-toggle.open .arrow { transform: rotate(90deg); }
.chapter-items { display: none; background: #fff; border-radius: 0 0 8px 8px; }
.chapter-items.open { display: block; }
.qitem { padding: 10px 16px; display: flex; align-items: flex-start; gap: 10px; cursor: pointer;
  border-bottom: 1px solid #f5f5f5; font-size: 14px; }
.qitem:hover { background: #fafafa; }
.qitem input { margin-top: 3px; flex-shrink: 0; }
.qitem .qi-text { flex: 1; line-height: 1.5; }
.qitem .qi-type { font-size: 11px; padding: 1px 6px; border-radius: 3px; font-weight: 600; flex-shrink: 0; }
.start-btn { display: block; margin: 20px auto; padding: 14px 48px; background: #e53935; color: #fff;
  border: none; border-radius: 10px; font-size: 17px; font-weight: 600; cursor: pointer; }
.start-btn:hover { background: #c62828; }
.start-btn:disabled { background: #ccc; cursor: not-allowed; }

.kp-layout { display: flex; gap: 24px; }
.kp-sidebar { width: 200px; position: sticky; top: 76px; align-self: flex-start;
  background: #fff; border-radius: 10px; padding: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.06); }
.kp-sidebar a { display: block; padding: 8px 12px; color: #555; text-decoration: none;
  font-size: 14px; border-radius: 6px; transition: all .2s; }
.kp-sidebar a:hover, .kp-sidebar a.active { background: #ffebee; color: #c62828; font-weight: 600; }
.kp-main { flex: 1; min-width: 0; }
.kp-card { background: #fff; border-radius: 12px; padding: 24px; margin-bottom: 16px;
  box-shadow: 0 2px 8px rgba(0,0,0,.06); }
.kp-card h3 { font-size: 18px; margin-bottom: 14px; color: #212121; }
.kp-card .kp-ch { display: inline-block; padding: 3px 10px; border-radius: 4px;
  font-size: 12px; font-weight: 600; background: #e3f2fd; color: #1565c0; margin-bottom: 12px; }
.kp-card p, .kp-card li { font-size: 15px; line-height: 1.8; color: #444; }
.kp-card ul { padding-left: 20px; }
.kp-card strong { color: #c62828; }

.empty { text-align: center; padding: 60px; color: #999; font-size: 16px; }

@media (max-width: 600px) {
  .kp-layout { flex-direction: column; }
  .kp-sidebar { width: 100%; position: static; display: flex; flex-wrap: wrap; gap: 4px; }
  .kp-sidebar a { font-size: 12px; padding: 4px 8px; }
  .filters { flex-direction: column; align-items: stretch; }
  .qtext { font-size: 15px; }
  nav .brand { font-size: 15px; margin-right: 12px; }
  nav .tab { padding: 6px 12px; font-size: 13px; }
  nav .stats { font-size: 11px; gap: 8px; }
}
</style>
</head>
<body>

<nav>
  <div class="brand">马原刷题</div>
  <div class="tabs">
    <div class="tab active" onclick="switchPage('quiz')">刷题</div>
    <div class="tab" onclick="switchPage('select')">选题</div>
    <div class="tab" onclick="switchPage('knowledge')">知识点</div>
  </div>
  <div class="stats" id="navStats">0 / 280题</div>
</nav>

<div id="quizPage" class="page active">
  <div class="filters">
    <select id="filterChapter" onchange="applyFilter()">
      <option value="全部">全部章节</option>
      <option value="绪论">绪论</option>
      <option value="第一章">第一章</option>
      <option value="第二章">第二章</option>
      <option value="第三章">第三章</option>
      <option value="第四章">第四章</option>
      <option value="综合">综合</option>
    </select>
    <select id="filterType" onchange="applyFilter()">
      <option value="全部">全部题型</option>
      <option value="single">单选题</option>
      <option value="multi">多选题</option>
      <option value="judge">判断题</option>
    </select>
    <select id="filterOrder" onchange="applyFilter()">
      <option value="order">顺序做题</option>
      <option value="random">随机做题</option>
    </select>
    <button onclick="resetProgress()">重新开始</button>
  </div>
  <div class="progress-wrap">
    <div class="progress-info">
      <span>第 <b id="curIdx">0</b> / <b id="totalQ">0</b> 题</span>
      <span id="progPct">0%</span>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progFill" style="width:0%"></div></div>
  </div>
  <div class="badges">
    <span class="badge badge-correct">答对 <b id="correctBadge">0</b></span>
    <span class="badge badge-wrong">答错 <b id="wrongBadge">0</b></span>
  </div>
  <div id="questionArea"></div>
</div>

<div id="selectPage" class="page">
  <input class="search-box" id="searchQ" placeholder="搜索题目..." oninput="renderSelectList()">
  <div class="select-header">
    <span class="count">已选 <b id="selCount">0</b> 题</span>
    <div class="actions">
      <button onclick="selectAll()">全选</button>
      <button onclick="clearAll()">清空</button>
    </div>
  </div>
  <div id="selectList"></div>
  <button class="start-btn" id="startBtn" disabled onclick="startSelected()">开始刷题（请先选题）</button>
</div>

<div id="knowledgePage" class="page">
  <input class="search-box" id="searchKp" placeholder="搜索知识点..." oninput="renderKnowledge()">
  <div class="kp-layout">
    <div class="kp-sidebar" id="kpSidebar"></div>
    <div class="kp-main" id="kpMain"></div>
  </div>
</div>

<div class="toast" id="toast"></div>
<div class="modal-overlay" id="modalOverlay" style="display:none">
  <div class="modal" id="modalContent"></div>
</div>

<script>
var QUESTIONS = [{"chapter": "绪论", "type": "single", "question": "马克思主义认为，哲学是", "options": {"A": "人们自发形成的世界观", "B": "无产阶级的世界观", "C": "唯物主义的世界观", "D": "系统化、理论化的世界观"}, "answer": "D", "explanation": "答案是D。", "source": "题库", "id": 1}, {"chapter": "绪论", "type": "single", "question": "费尔巴哈的一个重要贡献是在德国", "options": {"A": "发展了历史唯物主义", "B": "恢复了唯物主义的权威", "C": "克服了旧唯物主义的缺陷", "D": "克服了唯心主义的错误"}, "answer": "B", "explanation": "答案是B。", "source": "题库", "id": 2}, {"chapter": "绪论", "type": "single", "question": "马克思主义哲学按其本性来说是", "options": {"A": "批判的、革命的", "B": "运动的、发展的", "C": "时代的、客观的", "D": "科学的、真理的"}, "answer": "A", "explanation": "答案是A。", "source": "题库", "id": 3}, {"chapter": "绪论", "type": "single", "question": "马克思主义产生的最主要的自然科学基础是", "options": {"A": "机械力学、地质学", "B": "生物学、有机化学", "C": "细胞学说、能量守恒与转化定律、生物进化论", "D": "信息论、控制论和系统论"}, "answer": "C", "explanation": "答案是C。", "source": "题库", "id": 4}, {"chapter": "绪论", "type": "single", "question": "马克思主义从广义上说是", "options": {"A": "不仅指马克思恩格斯创立的基本理论、基本观点和学说的体系，也包括继承者对它的发展", "B": "马克思主义和列宁主义", "C": "关于无产阶级斗争的性质、目的和解放条件的学说", "D": "马克思和恩格斯创立的基本理论、基本观点和基本方法构成的科学体系"}, "answer": "A", "explanation": "答案是A。", "source": "题库", "id": 5}, {"chapter": "绪论", "type": "single", "question": "马克思主义哲学直接的理论来源是", "options": {"A": "古希腊罗马哲学", "B": "中世纪唯名论哲学", "C": "德国古典哲学", "D": "近代英国唯物主义哲学"}, "answer": "C", "explanation": "答案是C。", "source": "题库", "id": 6}, {"chapter": "绪论", "type": "single", "question": "产生于19世纪的马克思主义，至今仍然具有强大的生命力的根本原因在于", "options": {"A": "马克思恩格斯具有高尚的人格魅力", "B": "马克思对资本主义罪恶的正确批判", "C": "以实践为基础的科学性与革命性的统一", "D": "马克思科学地预见了全球化的性质和结果"}, "answer": "C", "explanation": "答案是C。", "source": "题库", "id": 7}, {"chapter": "绪论", "type": "single", "question": "对待马克思主义的正确态度应是", "options": {"A": "凡是经典著作中阐述的思想我们都必须坚持", "B": "产生于19世纪的马克思主义已经“过时了”", "C": "应当用儒家思想取代马克思主义在意识形态中的主导地位", "D": "在实践中坚持和发展马克思主义"}, "answer": "D", "explanation": "答案是D。", "source": "题库", "id": 8}, {"chapter": "绪论", "type": "multi", "question": "对待马克思主义，必须", "options": {"A": "解放思想、实事求是、与时俱进、求 说，这样的问题叫作", "options": {"A": "思维和存在的同一性问题", "B": "思维和存在何者为本原的问题", "C": "物质存在是否依赖意识的问题", "D": "物质和意识是否均是本原的问题"}, "answer": "A", "explanation": "答案是A。", "source": "题库", "id": 12}, {"chapter": "第一章", "type": "single", "question": "从前有个人，吃了生芝麻觉得一点都不好吃，炒熟了再一尝，满口喷香很有味道。他想：“既然熟芝麻好吃，我就用熟芝麻来当种子，不就直接收获熟芝麻了吗？”于是就种了很多熟芝麻种，结局可想而知。这则寓言启示我们", "options": {"A": "运用综合的思维方法有利于问题的解决", "B": "在认识和处理问题时要掌握适度原则", "C": "在矛盾特殊性的基础上概括出矛盾的普遍性", "D": "发挥主观能动性要以尊重客观规律为前提"}, "answer": "D", "explanation": "答案是D。", "source": "题库", "id": 13}, {"chapter": "第一章", "type": "single", "question": "20世纪80年代初，法国科学家首次用实验证实了“量子纠缠”现象的存在。科学家们设想，如果把“量子纠缠”原理用于通信，将极大提高通信的安全保密程度。为此，我国积极开展相关应用研究，并于2016年8月成功发射了世界上第一颗量子通讯卫星。这表明", "options": {"A": "意识是对客观存在的主观映像", "B": "要一切从实际出发，实事求是", "C": "客观物质世界是科学精神和理念的外现", "D": "人们可以在意识指导下能动地改造世界"}, "answer": "D", "explanation": "答案是D。", "source": "题库", "id": 14}, {"chapter": "第一章", "type": "single", "question": "身体每况愈下的病人看着窗外的一棵树，树叶在秋风中一片一片地掉落下来。他说：“当树叶全部掉光时，我也就要死了。”一位老画家得知后，画了一片青翠的树叶挂在树枝上，看着这片始终没有掉落的树叶，病人竟奇迹般的活了下来。故事蕴含的哲理是", "options": {"A": "精神的力量可以派生出物质的力量", "B": "意识对人体生理活动具有调控作用", "C": "实践活动可以割断不利于人的联系", "D": "意识对改造客观世界具有指导作用"}, "answer": "B", "explanation": "答案是B。", "source": "题库", "id": 15}, {"chapter": "第一章", "type": "single", "question": "被誉为“咫尺之内再造乾坤”的苏州园林，其设计源自江南风景中的曲径流水、雕窗匾额、楹联书画┄┄置身于其中，“风载书声出藕花”的江南情思油然而生。材料蕴含的哲理是", "options": {"A": "意识能够能动地改造客观世界", "B": "意识是沟通主客观世界的桥梁", "C": "意识是客观事物在人脑中的反映", "D": "意识对人的生理活动具有调节作用"}, "answer": "C", "explanation": "答案是C。", "source": "题库", "id": 16}, {"chapter": "第一章", "type": "single", "question": "2013年诺贝尔生理学或医学奖获得者的发现表明，生物体中的每一个细胞都像一个工厂，会生产和输出许多物质，这些物质被包裹囊泡内运输到细胞周围和细胞外。细胞内囊泡运输调控机制的发现，特别适用于解释一些疾病发生的原理，并研发药物以用于治疗。这说明", "options": {"A": "人可以认识和利用规律", "B": "人的理性为自然界立法", "C": "运动是相对的", "D": "物质的唯一特性是客观实在性"}, "answer": "A", "explanation": "答案是A。", "source": "题库", "id": 17}, {"chapter": "第一章", "type": "single", "question": "当前，有些家长“超前”“超负荷”地让孩子上各种培训班，使孩子学习压力过大，甚至产生厌学的情绪，结果拔苗助长、事与愿违。在孩子培养问题上，这些家长", "options": {"A": "认为事物发展不存在矛盾", "B": "忽视了规律在事物发展中的作用", "C": "没有看到事物发展过程存在质变", "D": "不重视外部条件对事物发展的影响"}, "answer": "B", "explanation": "答案是B。", "source": "题库", "id": 18}, {"chapter": "第一章", "type": "single", "question": "假象同真相一样，也是客观存在的。这是一种", "options": {"A": "辩证法的观点", "B": "唯物辩证法的观点", "C": "形而上学的观点", "D": "主观唯心主义的观点"}, "answer": "B", "explanation": "答案是B。", "source": "题库", "id": 19}, {"chapter": "第一章", "type": "single", "question": "实际工作中的“一刀切”的错误是由于忽视了事物的。", "options": {"A": "矛盾的普遍性", "B": "矛盾的特殊性", "C": "矛盾的同一性", "D": "矛盾的斗争性"}, "answer": "B", "explanation": "答案是B。", "source": "题库", "id": 20}, {"chapter": "第一章", "type": "single", "question": "矛盾是事物发展的动力，这说明事物发展的根本原因是", "options": {"A": "事物的内部矛盾", "B": "事物的特殊矛盾", "C": "事物的外部矛盾", "D": "事物的主要矛盾"}, "answer": "A", "explanation": "答案是A。", "source": "题库", "id": 21}, {"chapter": "第一章", "type": "single", "question": "刘禹锡“沉舟侧畔千帆过，病树前头万木春”这句诗蕴含的哲理是", "options": {"A": "事物是现象与本质的统一体", "B": "矛盾是事物发展的动力", "C": "新事物取代旧事物是事物发展的总趋势", "D": "事物的发展是量变和质变的统一"}, "answer": "C", "explanation": "答案是C。", "source": "题库", "id": 22}, {"chapter": "第一章", "type": "single", "question": "“安而不忘危，存而不忘亡，治而不忘乱”，这句话对我们的哲学启示是。", "options": {"A": "矛盾双方在一定的条件下是可以相互转化的", "B": "要透过现象认识事物的本质", "C": "事物的质具有不确定性", "D": "矛盾的主要方面决定事物的性质"}, "answer": "A", "explanation": "答案是A。", "source": "题库", "id": 23}, {"chapter": "第一章", "type": "single", "question": "“一切以条件、时间、地点为转移”的观点是", "options": {"A": "唯物辩证法的正确观点", "B": "夸大了主观条件的作用", "C": "取消了人的主观能动性", "D": "形而上学的错误观点"}, "answer": "A", "explanation": "答案是A。", "source": "题库", "id": 24}, {"chapter": "第一章", "type": "single", "question": "广大农民在致富奔小康的过程中深切体会到：“要富口袋，先富脑袋”。这一说法在哲学上的含义是", "options": {"A": "精神是第一性的，物质是第二性的", "B": "精神的力量可以变成物质的力量", "C": "精神的力量可以代替物质的力量", "D": "先有精神后有物质"}, "answer": "B", "explanation": "答案是B。", "source": "题库", "id": 25}, {"chapter": "第一章", "type": "single", "question": "“盲人摸象”与“管中窥豹，可见一斑”，告诉我们的哲理是", "options": {"A": "看问题要全面，反对以点代面、以偏概全", "B": "坚持两点论与重点论相结合", "C": "事物的发展是前进性与曲折性的统一", "D": "坚持适度原则"}, "answer": "A", "explanation": "答案是A。", "source": "题库", "id": 26}, {"chapter": "第一章", "type": "single", "question": "我国的社会主义建设事业，尽管在发展中曾遇到和仍将会遇到各种困难和挫折，但它已经取得并将继续取得巨大的成就和胜利。这说明", "options": {"A": "事物的发展是量变和质变的统一", "B": "事物的发展是运动和静止的统一", "C": "事物的发展是间断性和连续性的统一", "D": "事物的发展是前进性和曲折性的统一"}, "answer": "D", "explanation": "答案是D。", "source": "题库", "id": 27}, {"chapter": "第一章", "type": "single", "question": "建设先进社会主义文化，对传统文化必须批判的继承，这种态度依据的哲学道理是", "options": {"A": "世界是过程集合体的原理", "B": "新事物必然战胜旧事物的原理", "C": "内容决定形式的原理", "D": "辩证否定的原理"}, "answer": "D", "explanation": "答案是D。", "source": "题库", "id": 28}, {"chapter": "第一章", "type": "single", "question": "互联网给我们带来了丰富多彩、快捷的全球信息，但互联网本身还不完善，网上充斥着大量的垃圾信息和一些病毒程序，给人们造成了极大的经济损失，甚至一些邪教组织、贩毒集团、黑社会势力也在利用这一新的传媒手段进行新的犯罪活动。这表明", "options": {"A": "新事物的成长并不是一帆风顺的", "B": "矛盾是普遍存在的，互联网也不例外", "C": "矛盾双方的对立统一是消极和积极的对立统一", "D": "矛盾双方的转化总是在无条件地进行着，否则就不会有物质运动的绝对性"}, "answer": "B", "explanation": "答案是B。", "source": "题库", "id": 29}, {"chapter": "第一章", "type": "single", "question": "在人与世界的相互作用中，人与世界同时得到了改变，并获得日益丰富的内容。造成这一变化的基础是", "options": {"A": "自然界自身的运动", "B": "人的意识的能动作用", "C": "人的实践活动", "D": "工具的制造与使用"}, "answer": "C", "explanation": "答案是C。", "source": "题库", "id": 30}, {"chapter": "第一章", "type": "single", "question": "“居安思危”这名话体现的哲学道理是", "options": {"A": "矛盾双方在一定条件下可以相互转化", "B": "矛盾既具有普遍性又具有特殊性", "C": "内因和外因相结合推动事物发展", "D": "事物发展是量变和质变的统一"}, "answer": "A", "explanation": "答案是A。", "source": "题库", "id": 31}, {"chapter": "第一章", "type": "single", "question": "“让一部分人通过诚实劳动和合法经营先富起来，然后逐渐扩展,达到共同富裕的目标。”这体现了", "options": {"A": "总的量变过程中的部分质变原理", "B": "质变形式非爆发式的原理", "C": "质变过程中量的扩张的原理", "D": "质、量、度三者关系的原理"}, "answer": "A", "explanation": "答案是A。", "source": "题库", "id": 32}, {"chapter": "第一章", "type": "single", "question": "毛泽东指示我们要“古为今用”,“洋为中用”，既不能厚古薄今，又不能崇洋媚外。毛泽东的思想是符合唯物辩证法的", "options": {"A": "事物的发展的方向是前进性和曲折性相统一原理", "B": "质量互变规律的原理", "C": "否定既是发展的环节，又是联系的环节的原理", "D": "发展的实质是新事物的产生和旧事物灭亡的原理"}, "answer": "C", "explanation": "答案是C。", "source": "题库", "id": 33}, {"chapter": "第一章", "type": "single", "question": "有人说由于社会是由人构成的，而人的活动是受到他们各自的目的、理想和愿望等因素支配的，因此不存在社会规律。这种说法违背了", "options": {"A": "社会规律的可知性", "B": "社会规律的属人性", "C": "社会规律的客观性", "D": "社会规律的差异性"}, "answer": "C", "explanation": "答案是C。", "source": "题库", "id": 34}, {"chapter": "第一章", "type": "single", "question": "一代伟人毛泽东的诗句“坐地日行八万里，巡天遥看一千河”反映的哲学观点是", "options": {"A": "物质运动的客观性和时空的主观性的统一", "B": "物质运动无限性和有限性的统一", "C": "时空的无限性和有限性的统一", "D": "运动的绝对性和静止的相对性的统一"}, "answer": "D", "explanation": "答案是D。", "source": "题库", "id": 35}, {"chapter": "第一章", "type": "single", "question": "“机不可失，时不再来”说的是", "options": {"A": "时间的有限性", "B": "时间的不可逆性", "C": "时间的客观性", "D": "时间的相对性"}, "answer": "B", "explanation": "答案是B。", "source": "题库", "id": 36}, {"chapter": "第一章", "type": "single", "question": "“沉舟侧畔千帆过，病树前头万木春。”“芳林新叶催陈叶，流水前波让后波。”这两句诗包含的哲学道理是", "options": {"A": "矛盾是事物发展的动力", "B": "事物是本质和现象的统一", "C": "事物的发展是量变和质变的统一", "D": "新事物代替旧事物是事物发展的总趋势"}, "answer": "D", "explanation": "答案是D。", "source": "题库", "id": 37}, {"chapter": "第一章", "type": "single", "question": "辩证唯物主义认为规律是", "options": {"A": "思维对事物本质的概括和反映", "B": "用来整理感性材料的思维形式", "C": "事物内在的本质和稳定的联系", "D": "事物联系和发展的基本环节"}, "answer": "C", "explanation": "答案是C。", "source": "题库", "id": 38}, {"chapter": "第一章", "type": "single", "question": "黑格尔说“割下来的手就不是真正的人手了”。这句话表达的哲学道理是", "options": {"A": "承认世界的统一性", "B": "承认世界的本原是物质的", "C": "否认联系的形而上学观点", "D": "承认普遍联系的辩证法观点"}, "answer": "D", "explanation": "答案是D。", "source": "题库", "id": 39}, {"chapter": "第一章", "type": "single", "question": "“古之天下，亦今之天下，今之天下，亦古之天下”，这是", "options": {"A": "形而上学的观点", "B": "唯物主义观点", "C": "辩证法观点", "D": "唯心主义观点"}, "answer": "A", "explanation": "答案是A。", "source": "题库", "id": 40}, {"chapter": "第一章", "type": "single", "question": "唐代诗人顾况写道：“冬青树上挂凌霄，岁晏花凋树不凋，凡物各自有根本，种禾 终不生豆苗。”这首诗蕴含的哲理有下列(1)事物变化发展的根据是内因 (2)量变是质变的前提和必要条件 (3)事物变化发展有其内在的规律性(4)特殊的矛盾构成了一事物区别于他事物的特殊本质", "options": {"A": "(1)(2)(3)", "B": "(1)(2)(4)", "C": "(1)(3)(4)", "D": "(2)(3)(4)"}, "answer": "C", "explanation": "答案是C。", "source": "题库", "id": 41}, {"chapter": "第一章", "type": "single", "question": "宋朝有个画家叫文与可，在他住处周围有很多竹子。他一年四季观察竹子的变化， 对竹枝、竹叶在各个不同时期的形状、姿态有透彻了解，因而画出的竹子生动逼真，受到大家赞扬。有诗云：“与可画竹时，胸中有成竹”。“胸有成竹”这个成语流传至今。上述材料体现的哲学道理是", "options": {"A": "意识是物质长期发展的产物", "B": "意识是人脑的机能", "C": "意识是对客观存在的能动的反映", "D": "物质具有不依赖于人的意识的客观实在性"}, "answer": "C", "explanation": "答案是C。", "source": "题库", "id": 42}, {"chapter": "第一章", "type": "single", "question": "认识我国改革开放和社会主义现代化建设的形势，必须分清主流和支流，看到取得的成绩是主流，只有这样才能不迷失方向，坚定信心。这在哲学上坚持了", "options": {"A": "普遍联系的观点", "B": "运动发展的观点", "C": "“重点论”的观点", "D": "两点论”的观点"}, "answer": "C", "explanation": "答案是C。", "source": "题库", "id": 43}, {"chapter": "第一章", "type": "multi", "question": "2015年10月29日，中共十八届五中全会公报宣布，中国将“全面实施一对夫妻可生育两个孩子的政策，积极开展应对人口老龄化行动”。这是继“单独二孩”之后的又一次人口政策调整。从哲学的基本问题角度看，“人口政策的调整”体现了", "options": {"A": "物质决定意识，意识对物质具有反作用", "B": "世界的本原是物质，物质决定意识", "C": "思维和存在具有同一性", "D": "思维是对存在的正确反映"}, "answer": "BC", "explanation": "答案是BC。", "source": "题库", "id": 112}, {"chapter": "第一章", "type": "multi", "question": "2016年8月16日，世界首颗量子科学实验卫星“墨子号”在酒泉发射成功，标志着我国空间科学研究又迈出重要一步。这表明", "options": {"A": "人能够能动地认识和利用规律", "B": "实践是有意识、有目的的活动", "C": "人能够突破规律的限制，改造客观世界", "D": "科学实验是人类最基本的实践活动"}, "answer": "AB", "explanation": "答案是AB。", "source": "题库", "id": 113}, {"chapter": "第一章", "type": "multi", "question": "下列寓言蕴含的哲理一致的有", "options": {"A": "骐骥一跃，不能十步；驽马十驾，功在不舍", "B": "千里之堤 毁于蚁穴", "C": "沉舟侧畔千帆过，病树前头万木春", "D": "防微杜渐"}, "answer": "ABD", "explanation": "答案是ABD。", "source": "题库", "id": 114}, {"chapter": "第一章", "type": "multi", "question": "2012年6月，我国科学家利用“墨子号”量子科学实验卫星在国际上率先成功实现了千公里级的星地双向量子纠缠分发。“量子纠缠”就是两个（或多个）粒子共同构成的量子状态。无论粒子之间相隔多远。测验其中一个粒子必然会影响其他粒子。“量子纠缠”现象虽然未被完全认知。但它仍然能够说明。", "options": {"A": "世界的真正统一性在于它的物质性", "B": "事物联系的主观性和偶然性", "C": "事物联系的复杂性和多样性", "D": "物质世界联系的客观性和普遍性"}, "answer": "ACD", "explanation": "答案是ACD。", "source": "题库", "id": 115}, {"chapter": "第一章", "type": "multi", "question": "蝴蝶效应（The Butterfly Effect）是指在一个动力系统中，初始条件下微小的变化能带动整个系统的长期的巨大的连锁反应。这是一种混沌现象，蝴蝶在热带轻轻扇动一下翅膀，遥远的国家就可能造成一场飓风。对蝴蝶效应的正确理解是", "options": {"A": "蝴蝶扇动翅膀是引起龙卷风的根本原因", "B": "我们只能从昆虫的行为来把握气候变化的趋势", "C": "事物、现象之间的联系具有普遍性", "D": "蝴蝶扇动翅膀可能会引起一系列的连锁反应从而导致龙卷风"}, "answer": "CD", "explanation": "答案是CD。", "source": "题库", "id": 116}, {"chapter": "第一章", "type": "multi", "question": "下列说法中，正确体现意识能动性的有", "options": {"A": "运筹帷握", "B": "审时度势", "C": "纸上谈兵", "D": "画饼充饥"}, "answer": "AB", "explanation": "答案是AB。", "source": "题库", "id": 117}, {"chapter": "第一章", "type": "multi", "question": "古语说：“奢靡之始，危亡之渐。”这句话是说，奢靡逐步发展会导致灭亡。其中包含的哲学道理有", "options": {"A": "现象是本质的外部表现", "B": "可能会转化为现实", "C": "量变是质变的必要准备", "D": "质变是量变的必然结果"}, "answer": "CD", "explanation": "答案是CD。", "source": "题库", "id": 118}, {"chapter": "第一章", "type": "multi", "question": "“勿以恶小而为之，勿以善小而不为”体现的哲学道理有", "options": {"A": "事物的变化是从量变开始的", "B": "量变积累到一定程度会引起质变", "C": "内因是事物变化的根据", "D": "矛盾的普遍性存在于特殊性之中"}, "answer": "AB", "explanation": "答案是AB。", "source": "题库", "id": 119}, {"chapter": "第一章", "type": "multi", "question": "在下列命题中，包含辩证法思想的有", "options": {"A": "易穷则变，变则通，通则久", "B": "祸兮福之所倚，福兮祸之所伏", "C": "荣枯代谢而弥见其新", "D": "天下之势，循则极，极则反"}, "answer": "ABCD", "explanation": "答案是ABCD。", "source": "题库", "id": 120}, {"chapter": "第一章", "type": "multi", "question": "下列各项命题中，体现量变和质变辩证关系原理的有", "options": {"A": "九层之台，起于垒土", "B": "有无相生，前后相随", "C": "千里之堤，溃于蚁穴", "D": "冰冻三尺，非一日之寒"}, "answer": "ACD", "explanation": "答案是ACD。", "source": "题库", "id": 121}, {"chapter": "第一章", "type": "multi", "question": "对立统一规律是唯物辩证法的实质和核心，是因为它", "options": {"A": "揭示了事物发展的方向和道路", "B": "揭示了事物发展的源泉和动力", "C": "揭示了事物普遍联系的本质内容", "D": "是贯穿于辩证法其他规律和范畴的主线"}, "answer": "BCD", "explanation": "答案是BCD。", "source": "题库", "id": 122}, {"chapter": "第一章", "type": "multi", "question": "社会的物质性主要表现在", "options": {"A": "人类社会依赖于自然界，是整个物质世界的组成部分", "B": "人们谋取物质生活资料的实践活动虽然有意识作指导，但仍然是以物质力量改造物质力量的活动，仍然是物质性的活动", "C": "物质资料的生产方式是人类社会存在和发展的基础", "D": "社会生产关系本质上是物质关系"}, "answer": "ABCD", "explanation": "答案是ABCD。", "source": "题库", "id": 123}, {"chapter": "第一章", "type": "multi", "question": "唯物辩证法的基本范畴有", "options": {"A": "原因和结果", "B": "必然性和偶然性", "C": "可能性和现实性", "D": "现象和本质、形式和内容"}, "answer": "ABCD", "explanation": "答案是ABCD。", "source": "题库", "id": 124}, {"chapter": "第一章", "type": "multi", "question": "马克思说：“社会生活在本质上是实践的。”这一命题的主要含义是", "options": {"A": "实践是社会历史的客体", "B": "实践是社会历史的主体", "C": "实践构成了社会生活的现实基础", "D": "实践是社会生活的本质内容"}, "answer": "CD", "explanation": "答案是CD。", "source": "题库", "id": 125}, {"chapter": "第一章", "type": "multi", "question": "下列选项中，体现发展的实质的有", "options": {"A": "因祸得福，祸福相依", "B": "培育出新优质品种", "C": "无产阶级专政代替资产阶级专政", "D": "原始社会的公有制经过私有制到社会主义的公有制"}, "answer": "BCD", "explanation": "答案是BCD。", "source": "题库", "id": 126}, {"chapter": "第一章", "type": "judge", "question": "事物的量变和质变相互转化过程体现了事物的运动发展是连续性和非连续性的统一。", "answer": "对", "options": ["对", "错"], "id": "j_3"}, {"chapter": "第一章", "type": "judge", "question": "掌握适度原则就是任何时候都不要超过事物的度。", "answer": "错", "options": ["对", "错"], "id": "j_4"}, {"chapter": "第一章", "type": "judge", "question": "量变就是量变，是不包含任何质变的。", "answer": "错", "options": ["对", "错"], "id": "j_5"}, {"chapter": "第一章", "type": "judge", "question": "内部矛盾是事物发展的动力。", "answer": "对", "options": ["对", "错"], "id": "j_6"}, {"chapter": "第一章", "type": "judge", "question": "矛盾的观点是唯物辩证法的根本观点。", "answer": "对", "options": ["对", "错"], "id": "j_7"}, {"chapter": "第一章", "type": "judge", "question": "对思维与存在有无同一性的不同回答，是划分唯物主义与唯心主义的唯一标准", "answer": "错", "options": ["对", "错"], "id": "j_8"}, {"chapter": "第一章", "type": "judge", "question": "物质和运动是不可分的，凡是物质都是运动的，凡是运动都是物质的运动", "answer": "对", "options": ["对", "错"], "id": "j_9"}, {"chapter": "第一章", "type": "judge", "question": "物质可以变精神，精神也可以变物质。23", "answer": "对", "options": ["对", "错"], "id": "j_10"}, {"chapter": "第一章", "type": "judge", "question": "规律是客观的，因此人无法创造和利用客观规律。", "answer": "错", "options": ["对", "错"], "id": "j_11"}, {"chapter": "第一章", "type": "judge", "question": "具体问题具体分析是马克思主义的活的灵魂。", "answer": "对", "options": ["对", "错"], "id": "j_12"}, {"chapter": "第一章", "type": "judge", "question": "事物是质和量的对立统一。", "answer": "对", "options": ["对", "错"], "id": "j_13"}, {"chapter": "第一章", "type": "judge", "question": "静止是运动的一种特殊形式。", "answer": "对", "options": ["对", "错"], "id": "j_14"}, {"chapter": "第一章", "type": "judge", "question": "世界观就是哲学。", "answer": "错", "options": ["对", "错"], "id": "j_15"}, {"chapter": "第一章", "type": "judge", "question": "和谐意味着矛盾的绝对同一。", "answer": "错", "options": ["对", "错"], "id": "j_16"}, {"chapter": "第一章", "type": "judge", "question": "否定就是新旧事物之间“一刀两断”。", "answer": "错", "options": ["对", "错"], "id": "j_17"}, {"chapter": "第一章", "type": "judge", "question": "人类的一切活动分为认识世界的活动和改造世界的活动。", "answer": "对", "options": ["对", "错"], "id": "j_18"}, {"chapter": "第二章", "type": "single", "question": "辩证唯物论的认识论的第一的和基本的观点是", "options": {"A": "发展的观点", "B": "实践的观点", "C": "联系的观点", "D": "矛盾的观点"}, "answer": "B", "explanation": "答案是B。", "source": "题库", "id": 44}, {"chapter": "第二章", "type": "single", "question": "实践的本质是", "options": {"A": "实践是理性自主的道德活动", "B": "实践就是日常生活活动", "C": "主观改造客观的精神性活动", "D": "人类能动地改造世界的社会性物质活动"}, "answer": "D", "explanation": "答案是D。", "source": "题库", "id": 45}, {"chapter": "第二章", "type": "single", "question": "创客圈里有句名言：再好的创意如果不能转化为现实产品，那也是垃圾。这种说法", "options": {"A": "否定了认识活动的能动性", "B": "忽视了人类认识思维的创造性", "C": "突出了认识的发展性", "D": "强调了实践的直接现实性"}, "answer": "D", "explanation": "答案是D。", "source": "题库", "id": 46}, {"chapter": "第二章", "type": "single", "question": "马克思认为虽然蜜蜂建造蜂房使人间许多建筑师感到惭愧，但是它本质上还是一种本能活动。相反，即使是最蹩脚的建筑师也比最灵巧的蜜蜂高明，因为他在实践前已经在自己的头脑中把它建成了，这句话体现了", "options": {"A": "实践具有直接现实性", "B": "实践具有自觉能动性", "C": "实践具有社会性", "D": "实践具有历史性"}, "answer": "B", "explanation": "答案是B。", "source": "题库", "id": 47}, {"chapter": "第二章", "type": "single", "question": "下列不属于实践活动的是", "options": {"A": "张三去农村参加扶贫", "B": "李四在阅览室看小说", "C": "王五在天工楼给学生上课", "D": "赵六在百川楼做科学实验"}, "answer": "B", "explanation": "答案是B。", "source": "题库", "id": 48}, {"chapter": "第二章", "type": "single", "question": "毛泽东指出：“马克思主义的哲学认为十分重要的问题，不在于懂得了客观世界的规律性，因而能够解释世界，而在于拿了这种对于客观规律性的认识去能动地改造世界”。这表明", "options": {"A": "认识世界并不重要", "B": "认识的真理性只有在实践中才能得到检验和发展", "C": "认识是为了把握客观世界的规律，获得真理", "D": "认识世界的目的是为了改造世界"}, "answer": "D", "explanation": "答案是D。", "source": "题库", "id": 49}, {"chapter": "第二章", "type": "single", "question": "“实践没有止境，理论创新也没有止境。世界每时每刻都在发生变化，中国也每时每刻都在发生变化，我们必须在理论上跟上时代”，对这句话理解错误的是", "options": {"A": "实践永无止境", "B": "对真理的认识永无止境", "C": "要不断推进实践创新和理论创新", "D": "受实践条件的制约，人类永远不能认识世界"}, "answer": "D", "explanation": "答案是D。", "source": "题库", "id": 50}, {"chapter": "第二章", "type": "single", "question": "真理与谬误之间的相互关系是。", "options": {"A": "在任何情况下都是绝对对立的", "B": "没有相互转化的可能性", "C": "在一定条件下可以相互转化", "D": "两者之间没有原则区别"}, "answer": "C", "explanation": "答案是C。", "source": "题库", "id": 51}, {"chapter": "第二章", "type": "single", "question": "“对客观事物的反映即是真理”，这是。", "options": {"A": "混淆了真理性认识与一般认识的错误观点", "B": "辩证唯物主义的真理观", "C": "一切唯物主义的真理观", "D": "混淆了真理的客观性与客观规律性"}, "answer": "A", "explanation": "答案是A。", "source": "题库", "id": 52}, {"chapter": "第二章", "type": "single", "question": "承认我们知识的相对性就。", "options": {"A": "必然归结为诡辩论", "B": "必然归结为怀疑主义", "C": "必然归结为不可知论", "D": "可以防止认识的僵化"}, "answer": "D", "explanation": "答案是D。", "source": "题库", "id": 53}, {"chapter": "第二章", "type": "single", "question": "“人的认识是否具有真理性，这并不是一个理论的问题，而是一个实践的问题。人应该在实践中证明自己思维的真理性，即自己思维的现实性和力量。”这一论断说明了。", "options": {"A": "实践是认识的来源和动力", "B": "实践是检验认识是否具有真理性的唯一标准", "C": "实践检验真理不需要理论指导", "D": "认识活动与实践活动具有同样的作用和力量"}, "answer": "B", "explanation": "答案是B。", "source": "题库", "id": 54}, {"chapter": "第二章", "type": "single", "question": "真理的绝对性是指它的。", "options": {"A": "具体性", "B": "客观性", "C": "终极性", "D": "全面性"}, "answer": "B", "explanation": "答案是B。", "source": "题库", "id": 55}, {"chapter": "第二章", "type": "single", "question": "列宁指出：“没有抽象的真理，真理都是具体的。”这句话的含义是。", "options": {"A": "真理是具体的生动的形象", "B": "真理的形成不需要进行抽象的概括", "C": "真理是抽象不变的公式", "D": "真理有其适用的范围和条件"}, "answer": "D", "explanation": "答案是D。", "source": "题库", "id": 56}, {"chapter": "第二章", "type": "single", "question": "有人把个别的、局部的经验当作普遍真理，到处搬用，否认科学理论的指导意义。这在认识论上犯了类似于", "options": {"A": "唯理论的错误", "B": "经验论的错误", "C": "唯心主义先验论的错误", "D": "直观被动反映论的错误"}, "answer": "B", "explanation": "答案是B。", "source": "题库", "id": 57}, {"chapter": "第二章", "type": "single", "question": "“实践是知识的母亲，知识是生活的明灯。”这句谚语的哲学寓意是", "options": {"A": "知识既来自实践，又源于书本", "B": "理论必须在实践中接受检验，得到发展", "C": "实践是理论的基础，科学理论对实践有指导作用", "D": "在生活中，学习知识比实践更重要"}, "answer": "C", "explanation": "答案是C。", "source": "题库", "id": 58}, {"chapter": "第二章", "type": "single", "question": "1633年，伽利略因宣传“日心说”被教廷判处终生监禁。1979年11月10日罗马教皇在公开机会上正式承认伽利略在350年前受到教廷宣判是不公正的，公开为伽利略平反。这说明", "options": {"A": "谬误在一定条件可以转化为真理", "B": "真理终将战胜谬误", "C": "真理是不断发展的", "D": "真理在一定条件下可以转化为谬误"}, "answer": "B", "explanation": "答案是B。", "source": "题库", "id": 59}, {"chapter": "第二章", "type": "single", "question": "解放思想、与时俱进就是要", "options": {"A": "不受任何框架的束缚，思想上达到绝对自由", "B": "不受任何约束，做到随心所欲", "C": "抛弃原有的一切观念，重新评价一切", "D": "突破落后观念的束缚，坚持实事求是"}, "answer": "D", "explanation": "答案是D。", "source": "题库", "id": 60}, {"chapter": "第二章", "type": "single", "question": "雷锋同志有一句名言：“我觉得要使自己活着，就是为了使别人生活得更美好。”这句话体现了", "options": {"A": "每个人活着都是为了他人", "B": "人活着就是为了自己", "C": "人的价值在于对社会的贡献", "D": "人只有社会价值而没有个人价值"}, "answer": "C", "explanation": "答案是C。", "source": "题库", "id": 61}, {"chapter": "第二章", "type": "single", "question": "马克思说：“搬运夫和哲学家之间的原始差别要比家犬和猎犬之间的差别小得多。他们之间的鸿沟是分工掘成的。”这表明人的才能", "options": {"A": "与人的先天生理素质没有关联", "B": "主要来源于后天的实践", "C": "取决于人的主观努力的程度", "D": "是由人的社会政治地位决定的"}, "answer": "B", "explanation": "答案是B。", "source": "题库", "id": 62}, {"chapter": "第二章", "type": "single", "question": "唯物主义认识论与唯心主义认识论的根本分歧在于", "options": {"A": "是否承认世界的本原是物质的", "B": "是否承认矛盾是事物发展的动力", "C": "是否承认认识是客体在人脑中的反映", "D": "是否承认人有认识世界的能力"}, "answer": "C", "explanation": "答案是C。", "source": "题库", "id": 63}, {"chapter": "第二章", "type": "single", "question": "“没有革命的理论，就没有革命的行动”这句话说明的哲学道理是", "options": {"A": "科学理论对实践有指导作用", "B": "理论高于实践活动", "C": "理论是革命工作的出发点", "D": "理论对实践起决定作用"}, "answer": "A", "explanation": "答案是A。", "source": "题库", "id": 64}, {"chapter": "第二章", "type": "single", "question": "温家宝总理在给一位国务院参事的回信中，引用了两句诗：“知屋漏者在宇下，知政失者在草野”。这一古训蕴涵的哲理是", "options": {"A": "人的经验是判断是非得失的根本尺度", "B": e", "question": "社会必要劳动时间决定商品的社会价值。", "answer": "对", "options": ["对", "错"], "id": "j_64"}, {"chapter": "第四章", "type": "judge", "question": "商品供不应求，其价格上升，供过于求，其价格下跌，这说明商品的价值取决于供求关系。", "answer": "错", "options": ["对", "错"], "id": "j_65"}, {"chapter": "第四章", "type": "judge", "question": "商品的交换价值取决于商品的使用价值。", "answer": "错", "options": ["对", "错"], "id": "j_66"}, {"chapter": "第四章", "type": "judge", "question": "商品、货币与人类同时产生并伴随人类社会存在。", "answer": "错", "options": ["对", "错"], "id": "j_67"}, {"chapter": "第四章", "type": "judge", "question": "任何社会劳动力都是商品。", "answer": "错", "options": ["对", "错"], "id": "j_68"}, {"chapter": "第四章", "type": "judge", "question": "商品的本质因素是使用价值。A对B错2627", "answer": "错", "options": ["对", "错"], "id": "j_69"}, {"chapter": "综合", "type": "judge", "question": "马克思主义是关于自然、社会和人类思维发展具体规律的学说。", "answer": "错", "options": ["对", "错"], "id": "j_70"}, {"chapter": "综合", "type": "judge", "question": "马克思主义由马克思主义哲学、政治经济学和科学社会主义三个基本组成部分", "answer": "错", "options": ["对", "错"], "id": "j_71"}, {"chapter": "综合", "type": "judge", "question": "《德意志意识形态》的发表是马克思主义诞生的标志。", "answer": "错", "options": ["对", "错"], "id": "j_72"}, {"chapter": "综合", "type": "judge", "question": "《反杜林论》全面阐述了马克思主义理论体系", "answer": "对", "options": ["对", "错"], "id": "j_73"}, {"chapter": "综合", "type": "judge", "question": "本土化时代化是马克思主义创新发展的基本路径", "answer": "对", "options": ["对", "错"], "id": "j_74"}, {"chapter": "综合", "type": "judge", "question": "毛泽东思想是当代中国马克思主义、21世纪马克思主义", "answer": "错", "options": ["对", "错"], "id": "j_75"}, {"chapter": "综合", "type": "judge", "question": "马克思主义的基本特征是科学性和革命性的统一", "answer": "对", "options": ["对", "错"], "id": "j_76"}, {"chapter": "综合", "type": "judge", "question": "马克思主义物质观范畴揭示物质的唯一特性是运动", "answer": "错", "options": ["对", "错"], "id": "j_77"}, {"chapter": "综合", "type": "judge", "question": "人的实践活动是自然界与人类社会、主观世界和客观世界分化的关键，也是相统一的关键。", "answer": "对", "options": ["对", "错"], "id": "j_78"}, {"chapter": "综合", "type": "judge", "question": "意识具有改造客观世界的作用", "answer": "错", "options": ["对", "错"], "id": "j_79"}, {"chapter": "综合", "type": "judge", "question": "实践是正确发挥人的主观能动性的根本途径", "answer": "对", "options": ["对", "错"], "id": "j_80"}, {"chapter": "综合", "type": "judge", "question": "人工智能可能取代或超越人类智能。", "answer": "错", "options": ["对", "错"], "id": "j_81"}, {"chapter": "综合", "type": "judge", "question": "世界统一于存在", "answer": "错", "options": ["对", "错"], "id": "j_82"}, {"chapter": "综合", "type": "judge", "question": "联系和发展的观点是唯物辩证法的总观点，集中体现唯物辩证法的总特征", "answer": "对", "options": ["对", "错"], "id": "j_83"}, {"chapter": "综合", "type": "judge", "question": "质变量变规律是事物发展的根本规律", "answer": "错", "options": ["对", "错"], "id": "j_84"}, {"chapter": "综合", "type": "judge", "question": "辩证否定的实质是扬弃。", "answer": "对", "options": ["对", "错"], "id": "j_85"}, {"chapter": "综合", "type": "judge", "question": "认识事物的根本方法是矛盾分析法", "answer": "对", "options": ["对", "错"], "id": "j_86"}, {"chapter": "综合", "type": "judge", "question": "坚持问题导向是辩证唯物主义矛盾观点和矛盾分析法的时代表达和时代升华", "answer": "对", "options": ["对", "错"], "id": "j_87"}, {"chapter": "综合", "type": "judge", "question": "矛盾的观点是马克思主义的基本观点", "answer": "错", "options": ["对", "错"], "id": "j_88"}, {"chapter": "综合", "type": "judge", "question": "人类最基本的实践活动是社会政治实践", "answer": "错", "options": ["对", "错"], "id": "j_89"}, {"chapter": "综合", "type": "judge", "question": "实践是检验认识真理性的唯一标准", "answer": "对", "options": ["对", "错"], "id": "j_90"}, {"chapter": "综合", "type": "judge", "question": "认识的第一次飞跃是在实践基础上由感性认识到理性认识。", "answer": "对", "options": ["对", "错"], "id": "j_91"}, {"chapter": "综合", "type": "judge", "question": "认识的过程包括从实际到认识，再从认识到实践的过程", "answer": "对", "options": ["对", "错"], "id": "j_92"}, {"chapter": "综合", "type": "judge", "question": "真理与价值在实践中辩证统一", "answer": "对", "options": ["对", "错"], "id": "j_93"}, {"chapter": "综合", "type": "judge", "question": "改造世界就是改造客观世界", "answer": "错", "options": ["对", "错"], "id": "j_94"}, {"chapter": "综合", "type": "judge", "question": "实事求是是中国共产党思想路线的核心", "answer": "对", "options": ["对", "错"], "id": "j_95"}, {"chapter": "综合", "type": "judge", "question": "地理环境在社会发展中起决定作用", "answer": "错", "options": ["对", "错"], "id": "j_96"}, {"chapter": "综合", "type": "judge", "question": "社会基本矛盾是人类和自然界之间的矛盾", "answer": "错", "options": ["对", "错"], "id": "j_97"}, {"chapter": "综合", "type": "judge", "question": "生产力是人类社会生活和全部历史物质基础，是人类社会发展和进步的最终决定力量", "answer": "对", "options": ["对", "错"], "id": "j_98"}, {"chapter": "综合", "type": "judge", "question": "政治上层建筑的核心是政党", "answer": "错", "options": ["对", "错"], "id": "j_99"}, {"chapter": "综合", "type": "judge", "question": "当下中国社会主要矛盾是人们日益增长的物质文化需要同落后的生产力矛盾", "answer": "错", "options": ["对", "错"], "id": "j_100"}, {"chapter": "综合", "type": "judge", "question": "阶级斗争是社会发展的直接动力", "answer": "错", "options": ["对", "错"], "id": "j_101"}, {"chapter": "综合", "type": "judge", "question": "以私有制为基础的商品经济的基本矛盾是价值和使用价值的矛盾", "answer": "错", "options": ["对", "错"], "id": "j_102"}, {"chapter": "综合", "type": "judge", "question": "资本是一种物，比如货币", "answer": "错", "options": ["对", "错"], "id": "j_103"}, {"chapter": "综合", "type": "judge", "question": "科技带来无人工厂出现，智能机器人代替人创造剩余价值", "answer": "错", "options": ["对", "错"], "id": "j_104"}, {"chapter": "综合", "type": "judge", "question": "工资是工人劳动创造的价值", "answer": "错", "options": ["对", "错"], "id": "j_105"}, {"chapter": "综合", "type": "judge", "question": "共产主义就是一种制度", "answer": "错", "options": ["对", "错"], "id": "j_106"}];
var KNOWLEDGE = [{"id": 1, "chapter": "绪论", "title": "马克思主义的含义与理论来源", "content": "**马克思主义的含义：**\n马克思主义是由马克思和恩格斯创立的，为他们的后继承者所发展的，以反对资本主义、建设社会主义和实现共产主义为目标的科学理论体系，是关于无产阶级和人类解放的科学。\n\n**理论来源：**\n- 德国古典哲学\n- 英国古典政治经济学  \n- 英法两国的空想社会主义\n\n**经典著作：**\n两人合著：《神圣家族》《德意志意识形态》《共产党宣言》《新莱茵报》\n马克思著：《资本论》《法兰西内战》《哥达纲领批判》\n恩格斯著：《反杜林论》《家庭、私有制和国家的起源》《路德维希·费尔巴哈和德国古典哲学的终结》\n\n**鲜明特征：**\n1. 科学性：正确反映客观世界特别是人类社会本质和规律\n2. 革命性：具有鲜明的无产阶级政治立场，是批判的和革命的\n3. 实践性：以社会主义运动的实践为基础，致力于实现人民群众的根本利益", "html": "<p><strong>马克思主义的含义：</strong></p>\n<p>马克思主义是由马克思和恩格斯创立的，为他们的后继承者所发展的，以反对资本主义、建设社会主义和实现共产主义为目标的科学理论体系，是关于无产阶级和人类解放的科学。</p>\n<p><strong>理论来源：</strong></p>\n<ul>\n<li>德国古典哲学</li>\n<li>英国古典政治经济学</li>\n<li>英法两国的空想社会主义</li>\n</ul>\n<p><strong>经典著作：</strong></p>\n<p>两人合著：《神圣家族》《德意志意识形态》《共产党宣言》《新莱茵报》</p>\n<p>马克思著：《资本论》《法兰西内战》《哥达纲领批判》</p>\n<p>恩格斯著：《反杜林论》《家庭、私有制和国家的起源》《路德维希·费尔巴哈和德国古典哲学的终结》</p>\n<p><strong>鲜明特征：</strong></p>\n<p>1. 科学性：正确反映客观世界特别是人类社会本质和规律</p>\n<p>2. 革命性：具有鲜明的无产阶级政治立场，是批判的和革命的</p>\n<p>3. 实践性：以社会主义运动的实践为基础，致力于实现人民群众的根本利益</p>"}, {"id": 2, "chapter": "绪论", "title": "马克思主义基本原理", "content": "**马克思主义基本原理的含义：**\n\n1. **基本立场：** 是马克思主义观察、分析和解决问题的根本立足点和出发点\n2. **基本观点：** 是关于自然、社会和人类思维发展一般规律的科学认识，是对人类思想成果和社会实践经验的科学总结\n3. **基本方法：** 是建立在辩证唯物主义和历史唯物主义世界观和方法论基础上的指导我们正确认识世界和改造世界的思想方法和工作方法", "html": "<p><strong>马克思主义基本原理的含义：</strong></p>\n<p>1. <strong>基本立场：</strong> 是马克思主义观察、分析和解决问题的根本立足点和出发点</p>\n<p>2. <strong>基本观点：</strong> 是关于自然、社会和人类思维发展一般规律的科学认识，是对人类思想成果和社会实践经验的科学总结</p>\n<p>3. <strong>基本方法：</strong> 是建立在辩证唯物主义和历史唯物主义世界观和方法论基础上的指导我们正确认识世界和改造世界的思想方法和工作方法</p>"}, {"id": 3, "chapter": "第一章", "title": "哲学的基本问题", "content": "**哲学的基本问题：** 存在和思维、物质和精神的关系问题\n\n**哲学派别划分：**\n- **唯物主义 vs 唯心主义：** 物质决定意识 vs 意识决定物质\n- **可知论 vs 不可知论：** 世界是否可以被认识\n- **唯物史观 vs 唯心史观：** 物质生产方式决定社会发展 vs 精神因素决定社会发展\n- **辩证法 vs 形而上学：** 联系、发展、矛盾 vs 孤立、静止、片面", "html": "<p><strong>哲学的基本问题：</strong> 存在和思维、物质和精神的关系问题</p>\n<p><strong>哲学派别划分：</strong></p>\n<ul>\n<li><strong>唯物主义 vs 唯心主义：</strong> 物质决定意识 vs 意识决定物质</li>\n<li><strong>可知论 vs 不可知论：</strong> 世界是否可以被认识</li>\n<li><strong>唯物史观 vs 唯心史观：</strong> 物质生产方式决定社会发展 vs 精神因素决定社会发展</li>\n<li><strong>辩证法 vs 形而上学：</strong> 联系、发展、矛盾 vs 孤立、静止、片面</li>\n</ul>"}, {"id": 4, "chapter": "第一章", "title": "物质观", "content": "**物质的含义：** 物质就是不依赖于人类意识而存在并能为人类的意识所反映的客观存在\n\n**意识的含义：** 意识是人脑的机能和属性，是客观世界的主观映像\n\n**物质与意识的辩证关系：**\n- 物质决定意识（物质对意识的决定作用表现在意识的起源、本质和作用上）\n- 意识对物质具有反作用：\n  1. 意识活动具有目的性和计划性\n  2. 意识活动具有创造性\n  3. 意识具有指导实践改造客观世界的作用\n  4. 意识具有控制人的行为和生理活动的作用\n\n**主观能动性与客观规律性的统一：**\n- 首先，尊重客观规律是正确发挥主观能动性的前提\n- 其次，只有充分发挥主观能动性，才能正确认识和利用客观规律", "html": "<p><strong>物质的含义：</strong> 物质就是不依赖于人类意识而存在并能为人类的意识所反映的客观存在</p>\n<p><strong>意识的含义：</strong> 意识是人脑的机能和属性，是客观世界的主观映像</p>\n<p><strong>物质与意识的辩证关系：</strong></p>\n<ul>\n<li>物质决定意识（物质对意识的决定作用表现在意识的起源、本质和作用上）</li>\n<li>意识对物质具有反作用：</li>\n</ul>\n<p>  1. 意识活动具有目的性和计划性</p>\n<p>  2. 意识活动具有创造性</p>\n<p>  3. 意识具有指导实践改造客观世界的作用</p>\n<p>  4. 意识具有控制人的行为和生理活动的作用</p>\n<p><strong>主观能动性与客观规律性的统一：</strong></p>\n<ul>\n<li>首先，尊重客观规律是正确发挥主观能动性的前提</li>\n<li>其次，只有充分发挥主观能动性，才能正确认识和利用客观规律</li>\n</ul>"}, {"id": 5, "chapter": "第一章", "title": "运动观与时空观", "content": "**运动的含义：** 运动是标志一切事物和现象的变化及其过程的哲学范畴\n\n**运动与静止：**\n- 物质世界的运动是绝对的，静止是相对的\n- 无条件的绝对运动和有条件的相对静止构成对立统一关系\n- 运动和静止相互依赖、相互渗透、相互包含，\"静中有动，动中有静\"\n\n**运动与物质的关系：** 物质和运动是不可分割的\n\n**时空观：**\n- 时间：物质运动的持续性、顺序性，特点：一维性（一去不复返）\n- 空间：物质运动的广延性、伸张性，特点：三维性\n- 时空与物质运动：物质运动总是在一定的时间和空间中进行的", "html": "<p><strong>运动的含义：</strong> 运动是标志一切事物和现象的变化及其过程的哲学范畴</p>\n<p><strong>运动与静止：</strong></p>\n<ul>\n<li>物质世界的运动是绝对的，静止是相对的</li>\n<li>无条件的绝对运动和有条件的相对静止构成对立统一关系</li>\n<li>运动和静止相互依赖、相互渗透、相互包含，\"静中有动，动中有静\"</li>\n</ul>\n<p><strong>运动与物质的关系：</strong> 物质和运动是不可分割的</p>\n<p><strong>时空观：</strong></p>\n<ul>\n<li>时间：物质运动的持续性、顺序性，特点：一维性（一去不复返）</li>\n<li>空间：物质运动的广延性、伸张性，特点：三维性</li>\n<li>时空与物质运动：物质运动总是在一定的时间和空间中进行的</li>\n</ul>"}, {"id": 6, "chapter": "第一章", "title": "唯物辩证法 - 联系与发展", "content": "**联系的含义：** 联系是指事物内部各要素之间和事物之间相互影响、相互制约、相互作用的关系\n\n**联系的特点：** 客观性、普遍性、多样性、条件性\n\n**发展的含义：** 发展是前进性的运动，实质是新事物的产生和旧事物的灭亡\n\n**事物发展的规律：**\n- 对立统一规律（辩证法的实质和核心）\n- 量变质变规律\n- 否定之否定规律\n\n**量变与质变：**\n- 量变是质变的必要准备，质变是量变的必然结果\n- 量变达到一定程度才会引起质变", "html": "<p><strong>联系的含义：</strong> 联系是指事物内部各要素之间和事物之间相互影响、相互制约、相互作用的关系</p>\n<p><strong>联系的特点：</strong> 客观性、普遍性、多样性、条件性</p>\n<p><strong>发展的含义：</strong> 发展是前进性的运动，实质是新事物的产生和旧事物的灭亡</p>\n<p><strong>事物发展的规律：</strong></p>\n<ul>\n<li>对立统一规律（辩证法的实质和核心）</li>\n<li>量变质变规律</li>\n<li>否定之否定规律</li>\n</ul>\n<p><strong>量变与质变：</strong></p>\n<ul>\n<li>量变是质变的必要准备，质变是量变的必然结果</li>\n<li>量变达到一定程度才会引起质变</li>\n</ul>"}, {"id": 7, "chapter": "第一章", "title": "矛盾规律", "content": "**矛盾的基本属性：** 同一性和斗争性\n\n**矛盾的普遍性：** 矛盾存在于一切事物中，存在于一切事物发展过程的始终\n\n**矛盾的特殊性：** 不同事物的矛盾有其特殊性（具体问题具体分析）\n\n**主要矛盾与次要矛盾：**\n- 主要矛盾处于支配地位，决定事物的性质和发展方向\n- 在处理问题时要抓主要矛盾，同时兼顾次要矛盾\n\n**矛盾的主要方面与次要方面：**\n- 矛盾的主要方面决定事物的性质", "html": "<p><strong>矛盾的基本属性：</strong> 同一性和斗争性</p>\n<p><strong>矛盾的普遍性：</strong> 矛盾存在于一切事物中，存在于一切事物发展过程的始终</p>\n<p><strong>矛盾的特殊性：</strong> 不同事物的矛盾有其特殊性（具体问题具体分析）</p>\n<p><strong>主要矛盾与次要矛盾：</strong></p>\n<ul>\n<li>主要矛盾处于支配地位，决定事物的性质和发展方向</li>\n<li>在处理问题时要抓主要矛盾，同时兼顾次要矛盾</li>\n</ul>\n<p><strong>矛盾的主要方面与次要方面：</strong></p>\n<ul>\n<li>矛盾的主要方面决定事物的性质</li>\n</ul>"}, {"id": 8, "chapter": "第二章", "title": "认识论 - 实践与认识", "content": "**实践的含义：** 人类能动地改造世界的社会性物质活动\n\n**实践的基本形式：**\n1. 物质生产劳动实践（最基本形式）\n2. 社会政治实践\n3. 科学文化实践\n\n**实践的特点：** 直接现实性、自觉能动性、社会历史性\n\n**实践与认识的辩证关系：**\n- 实践决定认识（实践是认识的来源、动力、标准和目的）\n- 认识对实践具有反作用（正确的认识指导实践，错误的认识阻碍实践）\n\n**认识的辩证过程：**\n- 第一次飞跃：感性认识→理性认识（实践到认识）\n- 第二次飞跃：理性认识→实践（认识到实践）", "html": "<p><strong>实践的含义：</strong> 人类能动地改造世界的社会性物质活动</p>\n<p><strong>实践的基本形式：</strong></p>\n<p>1. 物质生产劳动实践（最基本形式）</p>\n<p>2. 社会政治实践</p>\n<p>3. 科学文化实践</p>\n<p><strong>实践的特点：</strong> 直接现实性、自觉能动性、社会历史性</p>\n<p><strong>实践与认识的辩证关系：</strong></p>\n<ul>\n<li>实践决定认识（实践是认识的来源、动力、标准和目的）</li>\n<li>认识对实践具有反作用（正确的认识指导实践，错误的认识阻碍实践）</li>\n</ul>\n<p><strong>认识的辩证过程：</strong></p>\n<ul>\n<li>第一次飞跃：感性认识→理性认识（实践到认识）</li>\n<li>第二次飞跃：理性认识→实践（认识到实践）</li>\n</ul>"}, {"id": 9, "chapter": "第二章", "title": "真理论", "content": "**真理的含义：** 真理是人们对客观事物及其规律的正确认识\n\n**真理的属性：**\n- 客观性：真理的内容是客观的\n- 绝对性：指真理的内容是客观的，是无条件的\n- 相对性：任何真理都有局限性，都不是终极真理\n\n**真理与谬误：** 在一定条件下可以相互转化\n\n**实践是检验真理的唯一标准：** 实践具有直接现实性，是联系主观与客观的桥梁\n\n**认识论的基本路线：** 从实践到认识，再从认识到实践，如此循环往复，不断深化", "html": "<p><strong>真理的含义：</strong> 真理是人们对客观事物及其规律的正确认识</p>\n<p><strong>真理的属性：</strong></p>\n<ul>\n<li>客观性：真理的内容是客观的</li>\n<li>绝对性：指真理的内容是客观的，是无条件的</li>\n<li>相对性：任何真理都有局限性，都不是终极真理</li>\n</ul>\n<p><strong>真理与谬误：</strong> 在一定条件下可以相互转化</p>\n<p><strong>实践是检验真理的唯一标准：</strong> 实践具有直接现实性，是联系主观与客观的桥梁</p>\n<p><strong>认识论的基本路线：</strong> 从实践到认识，再从认识到实践，如此循环往复，不断深化</p>"}, {"id": 10, "chapter": "第三章", "title": "历史唯物主义 - 社会存在与社会意识", "content": "**社会存在与社会意识的关系：**\n- 社会存在决定社会意识\n- 社会意识具有相对独立性，对社会存在有反作用\n\n**社会意识的相对独立性表现：**\n1. 与社会存在发展的不完全同步性\n2. 具有历史继承性\n3. 各种社会意识形式之间的相互影响\n4. 对社会存在具有能动的反作用\n\n**生产力与生产关系：**\n- 生产力决定生产关系\n- 生产关系对生产力有反作用\n- 生产关系要适应生产力状况\n\n**经济基础与上层建筑：**\n- 经济基础决定上层建筑\n- 上层建筑对经济基础有反作用", "html": "<p><strong>社会存在与社会意识的关系：</strong></p>\n<ul>\n<li>社会存在决定社会意识</li>\n<li>社会意识具有相对独立性，对社会存在有反作用</li>\n</ul>\n<p><strong>社会意识的相对独立性表现：</strong></p>\n<p>1. 与社会存在发展的不完全同步性</p>\n<p>2. 具有历史继承性</p>\n<p>3. 各种社会意识形式之间的相互影响</p>\n<p>4. 对社会存在具有能动的反作用</p>\n<p><strong>生产力与生产关系：</strong></p>\n<ul>\n<li>生产力决定生产关系</li>\n<li>生产关系对生产力有反作用</li>\n<li>生产关系要适应生产力状况</li>\n</ul>\n<p><strong>经济基础与上层建筑：</strong></p>\n<ul>\n<li>经济基础决定上层建筑</li>\n<li>上层建筑对经济基础有反作用</li>\n</ul>"}, {"id": 11, "chapter": "第三章", "title": "人民群众与历史创造", "content": "**人民群众是历史的创造者，根本原因在于：**\n人民群众是社会历史实践的主体\n\n**人民群众的历史作用：**\n1. 是社会物质财富的创造者\n2. 是社会精神财富的创造者\n3. 是推动社会变革的决定力量\n\n**群众路线：** 无产阶级政党一切工作的根本路线\n- 一切为了群众\n- 一切依靠群众\n- 从群众中来，到群众中去\n\n**社会进步的根本内容与根本尺度：** 生产力", "html": "<p><strong>人民群众是历史的创造者，根本原因在于：</strong></p>\n<p>人民群众是社会历史实践的主体</p>\n<p><strong>人民群众的历史作用：</strong></p>\n<p>1. 是社会物质财富的创造者</p>\n<p>2. 是社会精神财富的创造者</p>\n<p>3. 是推动社会变革的决定力量</p>\n<p><strong>群众路线：</strong> 无产阶级政党一切工作的根本路线</p>\n<ul>\n<li>一切为了群众</li>\n<li>一切依靠群众</li>\n<li>从群众中来，到群众中去</li>\n</ul>\n<p><strong>社会进步的根本内容与根本尺度：</strong> 生产力</p>"}, {"id": 12, "chapter": "第四章", "title": "商品与价值理论", "content": "**商品的含义：** 用于交换的劳动产品\n\n**商品的两因素：**\n- 使用价值：商品的自然属性，满足人们某种需要的属性\n- 价值：凝结在商品中的无差别的一般人类劳动，商品的社会属性\n\n**劳动的二重性：**\n- 具体劳动：创造使用价值，体现人与自然的关系\n- 抽象劳动：创造价值，体现商品生产者之间的社会关系\n\n**价值量的决定：** 由生产商品的社会必要劳动时间决定\n\n**价值规律：**\n- 内容：商品的价值量由社会必要劳动时间决定，商品交换以价值量为基础，实行等价交换\n- 作用：自发调节生产、刺激技术进步、促进优胜劣汰", "html": "<p><strong>商品的含义：</strong> 用于交换的劳动产品</p>\n<p><strong>商品的两因素：</strong></p>\n<ul>\n<li>使用价值：商品的自然属性，满足人们某种需要的属性</li>\n<li>价值：凝结在商品中的无差别的一般人类劳动，商品的社会属性</li>\n</ul>\n<p><strong>劳动的二重性：</strong></p>\n<ul>\n<li>具体劳动：创造使用价值，体现人与自然的关系</li>\n<li>抽象劳动：创造价值，体现商品生产者之间的社会关系</li>\n</ul>\n<p><strong>价值量的决定：</strong> 由生产商品的社会必要劳动时间决定</p>\n<p><strong>价值规律：</strong></p>\n<ul>\n<li>内容：商品的价值量由社会必要劳动时间决定，商品交换以价值量为基础，实行等价交换</li>\n<li>作用：自发调节生产、刺激技术进步、促进优胜劣汰</li>\n</ul>"}, {"id": 13, "chapter": "第四章", "title": "剩余价值理论", "content": "**劳动力商品：**\n- 价值：由维持劳动者本人生存、家属生存所必需的生活资料价值及教育训练费用构成\n- 使用价值：是价值的源泉（劳动力的使用即劳动，能创造价值）\n\n**剩余价值：**\n- 含义：雇佣劳动者在必要劳动时间之外创造的超过劳动力价值的那部分价值\n- 体现了资本家和雇佣工人之间剥削与被剥削的关系\n\n**资本的构成：**\n- 不变资本（c）：生产资料，价值转移，不会增殖\n- 可变资本（v）：劳动力，是剩余价值的源泉\n\n**资本主义基本矛盾：** 生产社会化和生产资料资本主义私人占有之间的矛盾\n\n**资本主义经济危机：** 生产过剩是其表现，根源是资本主义基本矛盾", "html": "<p><strong>劳动力商品：</strong></p>\n<ul>\n<li>价值：由维持劳动者本人生存、家属生存所必需的生活资料价值及教育训练费用构成</li>\n<li>使用价值：是价值的源泉（劳动力的使用即劳动，能创造价值）</li>\n</ul>\n<p><strong>剩余价值：</strong></p>\n<ul>\n<li>含义：雇佣劳动者在必要劳动时间之外创造的超过劳动力价值的那部分价值</li>\n<li>体现了资本家和雇佣工人之间剥削与被剥削的关系</li>\n</ul>\n<p><strong>资本的构成：</strong></p>\n<ul>\n<li>不变资本（c）：生产资料，价值转移，不会增殖</li>\n<li>可变资本（v）：劳动力，是剩余价值的源泉</li>\n</ul>\n<p><strong>资本主义基本矛盾：</strong> 生产社会化和生产资料资本主义私人占有之间的矛盾</p>\n<p><strong>资本主义经济危机：</strong> 生产过剩是其表现，根源是资本主义基本矛盾</p>"}];

var currentTab = 'quiz';
var currentList = [];
var currentIndex = 0;
var correctCount = 0, wrongCount = 0;
var selectedOptions = [];
var answered = false;
var selectedQIds = [];

var CHAPTERS = ['绪论','第一章','第二章','第三章','第四章','综合'];

// ---- Get option keys (works for both array and object formats) ----
function getOptKeys(q) {
  var opts = q.options;
  if (!opts) return ['A','B','C','D'];
  if (Array.isArray(opts)) return opts;
  // Object format: {"A": "text", "B": "text"}
  return Object.keys(opts);
}

function getOptText(q, key) {
  var opts = q.options;
  if (!opts) return '';
  if (Array.isArray(opts)) {
    var idx = ['A','B','C','D','E','F'].indexOf(key);
    return idx >= 0 ? opts[idx] : '';
  }
  return opts[key] || '';
}

// ---- Navigation ----
function switchPage(tab) {
  currentTab = tab;
  var tabs = document.querySelectorAll('.tab');
  tabs[0].classList.toggle('active', tab==='quiz');
  tabs[1].classList.toggle('active', tab==='select');
  tabs[2].classList.toggle('active', tab==='knowledge');
  document.getElementById('quizPage').classList.toggle('active', tab==='quiz');
  document.getElementById('selectPage').classList.toggle('active', tab==='select');
  document.getElementById('knowledgePage').classList.toggle('active', tab==='knowledge');
  if (tab==='quiz') renderQuestion();
  if (tab==='select') renderSelectList();
  if (tab==='knowledge') renderKnowledge();
}

// ---- Toast ----
var toastTimer;
function showToast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + (type==='success'?'toast-success':'toast-error') + ' show';
  clearTimeout(toastTimer);
  toastTimer = setTimeout(function(){ t.classList.remove('show'); }, type==='success'?1200:2000);
}

// ---- Filter ----
function applyFilter() {
  var ch = document.getElementById('filterChapter').value;
  var tp = document.getElementById('filterType').value;
  var od = document.getElementById('filterOrder').value;
  currentList = QUESTIONS.filter(function(q) {
    if (ch !== '全部' && q.chapter !== ch) return false;
    if (tp !== '全部' && q.type !== tp) return false;
    return true;
  });
  if (od === 'random') currentList = shuffle(currentList.slice());
  else currentList.sort(function(a,b){ return QUESTIONS.indexOf(a) - QUESTIONS.indexOf(b); });
  currentIndex = 0;
  correctCount = 0; wrongCount = 0;
  answered = false;
  renderQuestion();
  updateBadges();
}

function shuffle(arr) {
  for (var i = arr.length-1; i>0; i--) {
    var j = Math.floor(Math.random()*(i+1));
    var t = arr[i]; arr[i] = arr[j]; arr[j] = t;
  }
  return arr;
}

function resetProgress() {
  currentIndex = 0;
  correctCount = 0; wrongCount = 0;
  answered = false;
  selectedOptions = [];
  applyFilter();
}

function updateBadges() {
  document.getElementById('correctBadge').textContent = correctCount;
  document.getElementById('wrongBadge').textContent = wrongCount;
  document.getElementById('navStats').innerHTML = correctCount+wrongCount+' / '+QUESTIONS.length+'题';
}

function updateProgress() {
  document.getElementById('curIdx').textContent = Math.min(currentIndex+1, currentList.length);
  document.getElementById('totalQ').textContent = currentList.length;
  var pct = currentList.length ? Math.round(currentIndex/currentList.length*100) : 0;
  document.getElementById('progPct').textContent = pct+'%';
  document.getElementById('progFill').style.width = pct+'%';
}

// ---- Render question ----
function renderQuestion() {
  if (currentList.length === 0) {
    document.getElementById('questionArea').innerHTML = '<div class="empty">当前筛选条件下没有题目，请切换章节或题型</div>';
    updateProgress();
    return;
  }
  if (currentIndex >= currentList.length) {
    showFinish();
    return;
  }
  updateProgress();
  var q = currentList[currentIndex];
  selectedOptions = [];
  answered = false;

  var typeLabel, typeClass;
  if (q.type === 'single') { typeLabel = '单选'; typeClass = 'qtype-single'; }
  else if (q.type === 'multi') { typeLabel = '多选'; typeClass = 'qtype-multi'; }
  else { typeLabel = '判断'; typeClass = 'qtype-judge'; }

  var html = '<div class="qcard">' +
    '<div class="qmeta">' +
      '<span class="qchapter">' + q.chapter + '</span>' +
      '<span class="qtype ' + typeClass + '">' + typeLabel + '</span>' +
    '</div>' +
    '<div class="qtext">' + q.question + '</div>';

  if (q.type === 'multi') {
    html += '<div class="multi-hint">多选题，可选多项</div>';
  }

  if (q.type === 'judge') {
    html += '<div class="judge-opts">' +
      '<div class="judge-opt" onclick="selectJudge(this,\'对\')" id="judge0">对（正确）</div>' +
      '<div class="judge-opt" onclick="selectJudge(this,\'错\')" id="judge1">错（错误）</div>' +
    '</div>';
  } else {
    html += '<div class="options">';
    var keys = getOptKeys(q);
    for (var i = 0; i < keys.length; i++) {
      var k = keys[i];
      var txt = k + '. ' + getOptText(q, k);
      html += '<div class="opt" onclick="selectOption(this,\'' + k + '\',' + (q.type==='multi') + ')" id="opt' + k + '">' +
        '<span class="opt-key">' + k + '</span><span>' + getOptText(q, k) + '</span></div>';
    }
    html += '</div>';
  }

  if (q.type === 'multi') {
    html += '<button class="submit-btn" id="submitMultiBtn" disabled onclick="submitMultiChoice()">确认提交</button>';
  }

  html += '</div>';
  document.getElementById('questionArea').innerHTML = html;
}

// ---- Select single/multi option ----
function selectOption(el, key, isMulti) {
  if (answered) return;
  if (isMulti) {
    var idx = selectedOptions.indexOf(key);
    if (idx >= 0) selectedOptions.splice(idx, 1);
    else selectedOptions.push(key);
    var opts = document.querySelectorAll('.opt');
    for (var i = 0; i < opts.length; i++) {
      var k = opts[i].querySelector('.opt-key').textContent;
      opts[i].classList.toggle('selected', selectedOptions.indexOf(k) >= 0);
    }
    document.getElementById('submitMultiBtn').disabled = selectedOptions.length === 0;
  } else {
    selectedOptions = [key];
    answered = true;
    var opts = document.querySelectorAll('.opt');
    for (var i = 0; i < opts.length; i++) opts[i].classList.add('disabled');
    el.classList.add('selected');
    checkAnswer(key);
  }
}

// ---- Select judge ----
function selectJudge(el, val) {
  if (answered) return;
  selectedOptions = [val];
  answered = true;
  var opts = document.querySelectorAll('.judge-opt');
  for (var i = 0; i < opts.length; i++) opts[i].classList.add('disabled');
  el.classList.add('selected');
  checkAnswer(val);
}

// ---- Submit multi ----
function submitMultiChoice() {
  if (answered || selectedOptions.length === 0) return;
  answered = true;
  var opts = document.querySelectorAll('.opt');
  for (var i = 0; i < opts.length; i++) opts[i].classList.add('disabled');
  document.getElementById('submitMultiBtn').disabled = true;
  checkAnswer(selectedOptions.slice().sort().join(''));
}

// ---- Check answer ----
function checkAnswer(userAnswer) {
  var q = currentList[currentIndex];
  var isCorrect = false;

  if (q.type === 'judge') {
    isCorrect = userAnswer === q.answer;
  } else if (q.type === 'multi') {
    var correctSorted = String(q.answer).split('').sort().join('');
    isCorrect = userAnswer === correctSorted;
  } else {
    isCorrect = userAnswer === q.answer;
  }

  if (isCorrect) {
    correctCount++;
    updateBadges();
    if (q.type === 'judge') {
      var el = userAnswer === '对' ? document.getElementById('judge0') : document.getElementById('judge1');
      if (el) el.classList.add('correct');
    } else if (q.type === 'single') {
      var el = document.getElementById('opt'+userAnswer);
      if (el) el.classList.add('correct');
    } else {
      var keys = String(userAnswer).split('');
      for (var i = 0; i < keys.length; i++) {
        var el = document.getElementById('opt'+keys[i]);
        if (el) el.classList.add('correct');
      }
    }
    showToast('回答正确！继续加油', 'success');
    setTimeout(function(){ nextQuestion(); }, 1200);
  } else {
    wrongCount++;
    updateBadges();
    if (q.type === 'judge') {
      var el = userAnswer === '对' ? document.getElementById('judge0') : document.getElementById('judge1');
      if (el) el.classList.add('wrong');
      var cel = q.answer === '对' ? document.getElementById('judge0') : document.getElementById('judge1');
      if (cel) cel.classList.add('correct');
    } else if (q.type === 'single') {
      var el = document.getElementById('opt'+userAnswer);
      if (el) el.classList.add('wrong');
      var cel = document.getElementById('opt'+q.answer);
      if (cel) cel.classList.add('correct');
    } else {
      var ukeys = String(userAnswer).split('');
      var ckeys = String(q.answer).split('');
      for (var i = 0; i < ukeys.length; i++) {
        var el = document.getElementById('opt'+ukeys[i]);
        if (el) el.classList.add('wrong');
      }
      for (var i = 0; i < ckeys.length; i++) {
        var el = document.getElementById('opt'+ckeys[i]);
        if (el) el.classList.add('correct');
      }
    }
    showErrorModal(q, userAnswer);
  }
}

// ---- Error modal ----
function showErrorModal(q, userAnswer) {
  var userDisplay, correctDisplay;
  if (q.type === 'judge') {
    userDisplay = userAnswer;
    correctDisplay = q.answer;
  } else if (q.type === 'multi') {
    userDisplay = String(userAnswer).split('').join(', ');
    correctDisplay = String(q.answer).split('').join(', ');
  } else {
    userDisplay = userAnswer;
    correctDisplay = q.answer;
  }
  var explain = q.explanation || q.parsing || '请回顾相关知识点，加深理解。';
  document.getElementById('modalContent').innerHTML =
    '<h3>回答错误</h3>' +
    '<p style="color:#555;margin-bottom:12px;line-height:1.6;">' + q.question + '</p>' +
    '<div class="ans-row">你的答案：<span class="ans-wrong">' + userDisplay + '</span></div>' +
    '<div class="ans-row">正确答案：<span class="ans-correct">' + correctDisplay + '</span></div>' +
    '<div class="explain">' + explain + '</div>' +
    '<div class="modal-btns">' +
      '<button class="btn-retry" onclick="retryQuestion()">重试本题</button>' +
      '<button class="btn-next" onclick="nextQuestion()">下一题</button>' +
    '</div>';
  document.getElementById('modalOverlay').style.display = 'flex';
}

function retryQuestion() {
  document.getElementById('modalOverlay').style.display = 'none';
  answered = false;
  selectedOptions = [];
  renderQuestion();
}

function nextQuestion() {
  document.getElementById('modalOverlay').style.display = 'none';
  currentIndex++;
  answered = false;
  selectedOptions = [];
  if (currentIndex >= currentList.length) showFinish();
  else renderQuestion();
}

// ---- Finish page ----
function showFinish() {
  var total = correctCount + wrongCount;
  var pct = total ? Math.round(correctCount/total*100) : 0;
  var emoji = pct >= 90 ? '' : pct >= 70 ? '' : pct >= 50 ? '' : '';
  document.getElementById('questionArea').innerHTML =
    '<div class="finish">' +
      '<h2>' + emoji + ' 刷题完成！</h2>' +
      '<div class="score">' + pct + '%</div>' +
      '<div class="detail">答对 <b>' + correctCount + '</b> 题 &nbsp; 答错 <b>' + wrongCount + '</b> 题 &nbsp; 共 <b>' + total + '</b> 题</div>' +
      '<div class="finish-btns">' +
        '<button class="btn-primary" onclick="resetProgress()">再刷一遍</button>' +
        '<button class="btn-secondary" onclick="switchPage(\'select\')">重新选题</button>' +
      '</div>' +
    '</div>';
  updateProgress();
}

// ---- Select page ----
function renderSelectList() {
  var search = (document.getElementById('searchQ') ? document.getElementById('searchQ').value : '').toLowerCase();
  var html = '';
  var totalSel = 0;

  for (var ci = 0; ci < CHAPTERS.length; ci++) {
    var ch = CHAPTERS[ci];
    var qs = [];
    for (var i = 0; i < QUESTIONS.length; i++) {
      var q = QUESTIONS[i];
      if (q.chapter === ch && (!search || q.question.toLowerCase().indexOf(search) >= 0)) {
        qs.push({q: q, idx: i});
      }
    }
    if (qs.length === 0 && search) continue;

    var selInCh = 0;
    for (var i = 0; i < qs.length; i++) {
      if (selectedQIds.indexOf(qs[i].idx) >= 0) selInCh++;
    }
    totalSel += selInCh;

    html += '<div class="chapter-group">' +
      '<div class="chapter-toggle" onclick="var t=this;t.classList.toggle(\'open\');t.nextElementSibling.classList.toggle(\'open\')">' +
        '<span>' + ch + '（' + selInCh + '/' + qs.length + '）</span>' +
        '<span class="arrow">▶</span>' +
      '</div>' +
      '<div class="chapter-items">';

    for (var i = 0; i < qs.length; i++) {
      var q = qs[i].q;
      var idx = qs[i].idx;
      var checked = selectedQIds.indexOf(idx) >= 0 ? 'checked' : '';
      var prefix = (i+1) + '. ';
      var typeLabel, typeClass;
      if (q.type === 'single') { typeLabel='单选'; typeClass='qtype-single'; }
      else if (q.type === 'multi') { typeLabel='多选'; typeClass='qtype-multi'; }
      else { typeLabel='判断'; typeClass='qtype-judge'; }
      var shortQ = q.question.length > 35 ? q.question.substring(0,35)+'...' : q.question;
      html += '<label class="qitem">' +
        '<input type="checkbox" ' + checked + ' onchange="toggleQ(' + idx + ',this.checked)">' +
        '<span class="qi-text">' + prefix + shortQ + '</span>' +
        '<span class="qi-type ' + typeClass + '">' + typeLabel + '</span>' +
      '</label>';
    }
    html += '</div></div>';
  }

  document.getElementById('selectList').innerHTML = html || '<div class="empty">无匹配题目</div>';
  document.getElementById('selCount').textContent = totalSel;
  document.getElementById('startBtn').disabled = totalSel === 0;
  document.getElementById('startBtn').textContent = totalSel ? '开始刷题（' + totalSel + '题）' : '开始刷题（请先选题）';
}

function toggleQ(idx, checked) {
  if (checked) selectedQIds.push(idx);
  else selectedQIds = selectedQIds.filter(function(id){ return id !== idx; });
  renderSelectList();
}

function selectAll() {
  selectedQIds = [];
  for (var i = 0; i < QUESTIONS.length; i++) selectedQIds.push(i);
  renderSelectList();
}

function clearAll() {
  selectedQIds = [];
  renderSelectList();
}

function startSelected() {
  if (selectedQIds.length === 0) return;
  currentList = selectedQIds.map(function(i){ return QUESTIONS[i]; });
  currentIndex = 0;
  correctCount = 0; wrongCount = 0;
  answered = false;
  selectedOptions = [];
  updateBadges();
  updateProgress();
  switchPage('quiz');
}

// ---- Knowledge page ----
function renderKnowledge() {
  var search = (document.getElementById('searchKp') ? document.getElementById('searchKp').value : '').toLowerCase();
  var filtered = KNOWLEDGE.filter(function(k) {
    return !search || k.title.toLowerCase().indexOf(search) >= 0 || k.content.toLowerCase().indexOf(search) >= 0;
  });

  var sidebar = '';
  var main = '';
  for (var i = 0; i < filtered.length; i++) {
    var k = filtered[i];
    sidebar += '<a href="#kp' + i + '" onclick="document.getElementById(\'kp' + i + '\').scrollIntoView({behavior:\'smooth\'});return false">' + k.title + '</a>';
    main += '<div class="kp-card" id="kp' + i + '">' +
      '<span class="kp-ch">' + (k.chapter||'综合') + '</span>' +
      '<h3>' + k.title + '</h3>' +
      (k.html || '') +
    '</div>';
  }

  document.getElementById('kpSidebar').innerHTML = sidebar || '<span style="color:#999">无匹配</span>';
  document.getElementById('kpMain').innerHTML = main || '<div class="empty">无匹配知识点</div>';
}

// ---- Init ----
(function init() {
  currentList = QUESTIONS.slice();
  applyFilter();
  updateBadges();
})();
</script>
</body>
</html>
